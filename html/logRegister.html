<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/logRegister.css">
</head>

<body>
    <section>
        <div class="Login-auth">
            <div class="container">
                <h1>Welcome Back</h1>
                <p>Log in to your "WEBSITE NAME" account</p>
                <form id="loginForm">
                    <div class="login">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email">
                    </div>
                    <div class="password" id="loginPasswordGroup">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button type="submit">Log in</button>
                </form>
                <div class="auth-register">
                    <p>Don't have an account? <a href="" id="ShowRegister">Sign Up</a></p>
                </div>
            </div>
        </div>
        <div class="register-auth hidden">
            <div class="container">
                <h1>Create Account</h1>
                <p>Join "WEBSITE NAME" and start booking</p>
                <form id="RegisterForm">
                    <div class="formGroup" id="registerNameGroup">
                        <label for="registerName">Full Name</label>
                        <input type="text" id="registerName" placeholder="Enter your full name">
                    </div>
                    <div class="formGroup" id="registerEmailGroup">
                        <label for="">Email Address</label>
                        <input type="email" id="registerEmail" placeholder="Enter your email address">
                    </div>
                    <div class="formGroup" id="registerPhoneGroup">
                        <label for="registerPhone">Phone Number</label>
                        <input type="tel" id="registerPhone" placeholder="Enter your phone number">
                    </div>
                    <div class="formGroup" id="registerPasswordGroup">
                        <label for="registerPassword">Password</label>
                        <input type="password" id="registerPassword" placeholder="Enter your password">
                    </div>
                    <div class="formGroup" id="registerConfirmGroup">
                        <label for="">Confirm Password</label>
                        <input type="password" id="registerConfirm" placeholder="Confirm your password ">
                    </div>
                    <button type="submit">Create Account</button>
                </form>
                <div class="auth-register">
                    <p>Already have an account? <a href="" id="ShowLogin">Log In</a></p>
                </div>
            </div>
        </div>
    </section>
    <script src="/JavaScript/LogRegister.js"></script>
</body>

</html>
